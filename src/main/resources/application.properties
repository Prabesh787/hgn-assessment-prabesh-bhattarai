spring.application.name=hgh_assessement
server.port=${SERVER_PORT:8081}


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/hgh_assessement}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# A signal within this window of the last one is a retransmission, folded into the live alert instead of opening a new one.
alert.dedup.window-minutes=${ALERT_DEDUP_WINDOW_MINUTES:1}


