services:
  db:
    image: postgres:16-alpine
    container_name: hgh_assessement_db
    environment:
      POSTGRES_DB: hgh_assessement
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d hgh_assessement"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hgh_assessement_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-8081}
      DB_URL: jdbc:postgresql://db:5432/hgh_assessement
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
    ports:
      - "${SERVER_PORT:-8081}:${SERVER_PORT:-8081}"

volumes:
  postgres_data:
